<!-- Construction Favicon (Yellow Wavy Lines) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32">
  <!-- Yellow background shape -->
  <path d="M0,20 Q50,0 100,20 T200,20 L200,120 Q150,140 100,120 T0,120 Z" fill="yellow"/>
  <!-- Four wavy black lines -->
  <path d="M20 40 Q60 20 100 40 T180 40" stroke="black" fill="none" stroke-width="3"/>
  <path d="M20 60 Q60 40 100 60 T180 60" stroke="black" fill="none" stroke-width="3"/>
  <path d="M20 80 Q60 60 100 80 T180 80" stroke="black" fill="none" stroke-width="3"/>
  <path d="M20 100 Q60 80 100 100 T180 100" stroke="black" fill="none" stroke-width="3"/>
</svg>
